<style>
:root{--bg:#0c0c14;--card:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.06);--gold:#D4A853;--green:#34D399;--blue:#60A5FA;--purple:#A78BFA;--red:#ef4444;--amber:#F59E0B;--txt:#e0e0e5;--txt2:#888;--txt3:#555;--glow:none}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);background-image:var(--glow);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;transition:background .8s,background-image .8s;overscroll-behavior:none}
h1,h2,h3,.hf{font-family:'Outfit',sans-serif}
.lbl{font-size:11px;letter-spacing:2px;font-weight:700;color:var(--txt3);font-family:'Outfit',sans-serif;margin-bottom:8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:border-color .5s}
.btn{border:none;border-radius:10px;padding:12px 20px;cursor:pointer;font-weight:700;font-size:14px;font-family:'Outfit',sans-serif;transition:transform .1s}
.btn:active{transform:scale(0.96)}
.inp{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:12px;color:#e0e0e5;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;width:100%}
.inp:focus{border-color:rgba(212,168,83,0.4)}
textarea.inp{resize:vertical;min-height:60px;font-size:14px;line-height:1.6}
.tab-content{animation:fadeIn .3s ease;padding:14px 16px 100px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(16px)}
.ov-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:24px;cursor:pointer;z-index:210}
.habit-row{display:flex;align-items:center;gap:10px;padding:14px 14px;margin-bottom:4px;border-radius:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.04);transition:all .15s}
.habit-row.on{background:rgba(52,211,153,0.06);border-color:rgba(52,211,153,0.15)}
.habit-check{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .15s}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,20,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 16px;z-index:100}
.nav-btn{background:none;border:none;cursor:pointer;padding:6px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#444;border-radius:10px;transition:all .2s;font-family:'Outfit',sans-serif}
.nav-btn.active{color:var(--gold);background:rgba(212,168,83,0.07)}
.nav-btn .icon{font-size:22px;font-weight:300}
.nav-btn .label{font-size:10px;font-weight:400}
.nav-btn.active .label{font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.slider-row{display:flex;gap:6px;margin-top:4px}
.slider-cell{flex:1;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;border:1px solid rgba(255,255,255,0.05);transition:all .15s}
.water-dot{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;border:1px solid rgba(255,255,255,0.04);transition:all .1s}
.water-dot.filled{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.2)}
.ex-row{border-left:4px solid var(--purple);padding:0;overflow:hidden}
.ex-header{padding:14px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ex-detail{padding:4px 14px 14px;border-top:1px solid rgba(255,255,255,0.03)}
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.set-input{width:60px;text-align:center;padding:10px 4px;font-size:16px;border-radius:8px}
.progress-bar{background:rgba(255,255,255,0.05);border-radius:4px;height:5px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
.dot-row{display:flex;gap:4px;justify-content:center;margin-top:12px}
.dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,0.1)}
.dot.done{background:var(--green)}.dot.active{background:var(--gold)}
.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(52,211,153,0.95);color:#000;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;z-index:300;animation:toastIn .3s ease;pointer-events:none;white-space:nowrap}
</style>

function tod(){return new Date().toISOString().split("T")[0]}
function cl(v,a,b){return Math.max(a,Math.min(b,v))}
function hsc(day){if(!day||!day.h)return 0;return Math.round(Object.values(day.h).filter(Boolean).length/HB.length*100)}

function getChronoAge(){const b=new Date(1983,8,3),now=new Date();let age=now.getFullYear()-b.getFullYear();if(now.getMonth()<b.getMonth()||(now.getMonth()===b.getMonth()&&now.getDate()<b.getDate()))age--;return age;}

  if(alc>2)ins.push({t:"🍷 Alcohol "+alc+"/7 days — each session ≈ 500 empty kcal + wrecked sleep",c:"#ef4444"});
  const pr=v.filter(d=>d.h?.pranayama).length;
  if(pr<3)ins.push({t:"🌬️ Pranayama only "+pr+"/7 days. Your stress stays elevated without it.",c:"#A78BFA"});
  else if(pr>=5)ins.push({t:"🌬️ Pranayama "+pr+"/7 — excellent consistency!",c:"#34D399"});
  const hd=v.filter(d=>d.h?.homeFood).length;
  if(hd<4)ins.push({t:"🏠 Home dinner only "+hd+"/7 days. Each outside meal ≈ +400 kcal.",c:"#F59E0B"});
  const avgS=v.filter(d=>d.stress).length?v.reduce((a,d)=>a+(d.stress||0),0)/v.filter(d=>d.stress).length:0;
  if(avgS>=4)ins.push({t:"😰 Avg stress "+(avgS).toFixed(1)+"/5 — exercise + pranayama days show 40% lower.",c:"#ef4444"});
  return ins.length?ins:[{t:"✨ Strong week. Keep showing up.",c:"#34D399"}];
}
function getBio(){
  const cw=getCW(),bmi=cw/3.35,v=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const dd=D.days[d.toISOString().split("T")[0]];if(dd)v.push(dd);}
  const act=v.filter(d=>d.h?.exercise).length;
  const avgStr=v.filter(d=>d.stress).length?v.reduce((a,d)=>a+(d.stress||0),0)/v.filter(d=>d.stress).length:4;
  const alc=v.filter(d=>!d.h?.noAlc).length;
  return bioA(bmi,act,5.5,avgStr,alc);
}
function getTimeMachine(){
  const cw=getCW();
  if(D.wts.length<2){
    return{rate:0,dates:MS.map(m=>{const need=cw-m.kg;return{...m,dt:need<=0?"DONE ✅":"Log daily to predict"};}),msg:"⏳ Log weight for 3+ days to see predicted arrival dates"};
  }
  const r=D.wts.slice(-14);if(r.length<2)return{rate:0,dates:MS.map(m=>({...m,dt:"Need more data"})),msg:"⏳ Keep logging weight daily"};
  const days=(new Date(r[r.length-1].d)-new Date(r[0].d))/86400000||1;
  const rate=(r[0].w-r[r.length-1].w)/days;
  if(rate<=0)return{rate:0,dates:MS.map(m=>{const need=cw-m.kg;return{...m,dt:need<=0?"DONE ✅":"STALLED ⚠️"};}),msg:"⚠️ Weight not dropping. Tighten diet + move more."};
  return{rate,dates:MS.map(m=>{const need=cw-m.kg;if(need<=0)return{...m,dt:"DONE ✅"};const d=new Date();d.setDate(d.getDate()+Math.ceil(need/rate));return{...m,dt:d.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})};})};
}
function getNM(){const cw=getCW();return MS.find(m=>cw>m.kg)||MS[2]}
function getAR(){return RC.find(r=>r.id===D.ar)||RC[0]}

function updateHeader(){

  const ring=document.getElementById('scoreRing');

function render(){

// ── CHARTS ──
function initCharts(){
  // Heatmap
  const hmEl=document.getElementById('heatmap');
  if(hmEl){
    let cells=[];
    for(let i=83;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);cells.push(hsc(D.days[d.toISOString().split("T")[0]]));}
    let html='';
    for(let w=0;w<12;w++){
      html+='<div style="display:flex;flex-direction:column;gap:2px">';
      for(let d=0;d<7;d++){
        const s=cells[w*7+d]||0;
        const c=s===0?'rgba(255,255,255,0.03)':s<30?'#ef444440':s<60?'#f59e0b40':s<80?'#D4A85360':'#34D39960';
        html+=`<div style="width:10px;height:10px;border-radius:2px;background:${c}"></div>`;
      }
      html+='</div>';
    }
    hmEl.innerHTML=html;
  }
  // Weight chart
  const wCtx=document.getElementById('weightChart');
  if(wCtx&&D.wts.length>1){
    const data=D.wts.slice(-14);
    charts.weight=new Chart(wCtx,{type:'line',data:{labels:data.map(p=>p.d.slice(5)),datasets:[{data:data.map(p=>p.w),borderColor:'#D4A853',backgroundColor:'rgba(212,168,83,0.1)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#D4A853'}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a2e',titleColor:'#888',bodyColor:'#D4A853'}},scales:{x:{grid:{display:false},ticks:{color:'#555',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#555',font:{size:9}}}}}});
  }
  // Week chart
  const kCtx=document.getElementById('weekChart');
  if(kCtx){
    const wkData=Array.from({length:7}).map((_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const k=d.toISOString().split("T")[0];return{d:new Date(k+"T12:00:00").toLocaleDateString("en",{weekday:"short"}),s:hsc(D.days[k])};});
    charts.week=new Chart(kCtx,{type:'bar',data:{labels:wkData.map(d=>d.d),datasets:[{data:wkData.map(d=>d.s),backgroundColor:'#D4A853',borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#555',font:{size:10}}},y:{max:100,grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#555',font:{size:9}}}}}});
  }
}

// ── ACTIONS ──
function toast(msg,color){
  const el=document.createElement('div');
  el.className='toast';
  if(color)el.style.background=color;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.animation='toastOut .3s ease forwards';setTimeout(()=>el.remove(),300);},1500);
}
function toggleHabit(id){setDay(c=>{const on=!c.h[id];toast(on?'✓ '+HB.find(h=>h.id===id).l:'✗ Unmarked','rgba('+(on?'52,211,153':'239,68,68')+',0.95)');return{...c,h:{...c.h,[id]:on}};})}
function setDayField(k,v){setDay(c=>({...c,[k]:v}))}
function logWeight(){
  const el=document.getElementById('weightInput');if(!el)return;
  const w=parseFloat(el.value);if(isNaN(w)||w<50||w>200)return;
  const i=D.wts.findIndex(e=>e.d===tod());
  if(i>=0)D.wts[i].w=w;else D.wts.push({d:tod(),w});
  toast('⚖️ '+w+' kg logged');
  saveData();render();
}
function logMeal(){
  const el=document.getElementById('mealInput');if(!el||!el.value.trim())return;
  const cal=parseCal(el.value);
  toast('🍽️ Logged'+(cal?' · '+cal+' kcal':''));
  setDay(c=>({...c,meals:[...(c.meals||[]),{t:timeStr(),x:el.value.trim(),cal}]}));
}
function quickLogMeal(item){

let audioCtx_=null;
function playChime(){
  try{
    if(!audioCtx_)audioCtx_=new(window.AudioContext||window.webkitAudioContext)();
    const now=audioCtx_.currentTime;
    [880,1320].forEach((f,i)=>{const o=audioCtx_.createOscillator(),g=audioCtx_.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(audioCtx_.destination);const s=now+i*0.08;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.28,s+0.01);g.gain.exponentialRampToValueAtTime(0.0001,s+1.8);o.start(s);o.stop(s+2);});
    setTimeout(()=>{if(!audioCtx_)return;const o=audioCtx_.createOscillator(),g=audioCtx_.createGain();o.type='sine';o.frequency.value=660;o.connect(g);g.connect(audioCtx_.destination);const n=audioCtx_.currentTime;g.gain.setValueAtTime(0.0001,n);g.gain.exponentialRampToValueAtTime(0.22,n+0.01);g.gain.exponentialRampToValueAtTime(0.0001,n+2);o.start(n);o.stop(n+2.2);},2200);
  }catch(e){}
}
function startBreath(name){
  const tech=BRX.find(b=>b.name===name);if(!tech)return;
  const ov=document.getElementById('overlayBreath');
  let el=0,run=false;
  function renderTimer(){
    const done=el>=tech.sec&&el>0,rm=tech.sec-el;
    const pct=tech.sec>0?(el/tech.sec*100):0;
    const ringR=60,ringC=2*Math.PI*ringR;
    ov.innerHTML=`<button class="ov-close" onclick="closeBreath()" style="font-size:28px">✕</button>
      <div class="hf" style="font-size:14px;letter-spacing:4px;color:#888;margin-bottom:24px">${esc(tech.name.toUpperCase())}</div>
      <div style="position:relative;width:160px;height:160px;margin-bottom:24px">
        <svg width="160" height="160" style="transform:rotate(-90deg)">
          <circle cx="80" cy="80" r="${ringR}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="4"/>
          <circle cx="80" cy="80" r="${ringR}" fill="none" stroke="${done?'#34D399':'#D4A853'}" stroke-width="4" stroke-dasharray="${ringC}" stroke-dashoffset="${ringC-pct/100*ringC}" stroke-linecap="round" style="transition:stroke-dashoffset 0.5s"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          ${done?`<div style="font-size:48px">✨</div><div class="hf" style="font-size:14px;color:#34D399;margin-top:4px">DONE</div>`
          :`<div class="hf" style="font-size:44px;font-weight:200;color:#fff">${Math.floor(rm/60)}:${(rm%60).toString().padStart(2,'0')}</div>`}
        </div>
      </div>
      <button style="width:72px;height:72px;border-radius:50%;border:3px solid ${run?'#ef4444':done?'#34D399':'#D4A853'};background:${run?'rgba(239,68,68,0.06)':done?'rgba(52,211,153,0.06)':'rgba(212,168,83,0.06)'};color:${run?'#ef4444':done?'#34D399':'#D4A853'};font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="toggleBreath()">${run?'❚❚':done?'✓':'▶'}</button>
      ${!run&&!done?`<div style="margin-top:28px;max-width:280px;text-align:center">${tech.st.map((s,i)=>`<div style="font-size:14px;color:#777;line-height:2">${i+1}. ${esc(s)}</div>`).join('')}</div>`:''}
      ${done?`<div class="hf" style="margin-top:16px;font-size:13px;color:#888">Tap ✓ to log</div>`:''}`;
    ov.classList.remove('hidden');
  }
  window.toggleBreath=()=>{
    if(el>=tech.sec){
      toast('🧘 '+tech.name+' complete');
      setDay(c=>({...c,br:[...(c.br||[]),{n:tech.name,a:timeStr()}]}));
      closeBreath();return;
    }
    run=!run;
    if(run){breathInterval=setInterval(()=>{el++;if(el>=tech.sec){run=false;clearInterval(breathInterval);playChime();}renderTimer();},1000);}
    else{clearInterval(breathInterval);}
    renderTimer();
  };
  window.closeBreath=()=>{clearInterval(breathInterval);ov.classList.add('hidden');run=false;el=0;};
  renderTimer();
}

function startFlow(type){
  const steps=type==='morning'?MRN:EVN;
  const title=type==='morning'?'MORNING RUNWAY':'EVENING WIND-DOWN';
  const ov=document.getElementById('overlayFlow');
  let ci=0,tm=0,run=false,t0=Date.now();
  function renderFlow(){
    const s=steps[ci],rm=s.d?s.d-tm:0,last=ci===steps.length-1;
    ov.innerHTML=`<button class="ov-close" onclick="closeFlow()">✕</button>
      <div class="hf" style="font-size:10px;letter-spacing:3px;color:#D4A853">${title} · ${ci+1}/${steps.length}</div>
      <div style="font-size:48px;margin:20px 0">${s.i}</div>
      <div class="hf" style="font-size:20px;font-weight:700;color:#fff;text-align:center;max-width:260px">${esc(s.l)}</div>
      ${s.d>0?`<div class="hf" style="font-size:32px;font-weight:200;color:#fff;margin:16px 0">${Math.floor(rm/60)}:${(rm%60).toString().padStart(2,'0')}</div>
        ${tm<s.d?`<button class="btn" style="padding:6px 20px;border-radius:14px;border:1px solid #60A5FA;background:rgba(96,165,250,0.1);color:#60A5FA" onclick="toggleFlow()">${run?'Pause':'Start Timer'}</button>`:''}`:''}
      <button class="btn" style="margin-top:20px;padding:12px 32px;background:${last?'linear-gradient(135deg,#34D399,#059669)':s.d&&tm<s.d?'#222':'#D4A853'};color:${last||!s.d||tm>=s.d?'#000':'#555'};font-size:15px;opacity:${s.d&&tm<s.d?0.4:1}" onclick="nextFlowStep()">${last?'✨ Complete':'Next →'}</button>
      <div class="dot-row">${steps.map((_,j)=>`<div class="dot ${j<ci?'done':j===ci?'active':''}"></div>`).join('')}</div>`;
    ov.classList.remove('hidden');
  }
  window.toggleFlow=()=>{
    run=!run;
    if(run){flowInterval=setInterval(()=>{tm++;if(tm>=steps[ci].d){run=false;clearInterval(flowInterval);}renderFlow();},1000);}
    else{clearInterval(flowInterval);}
    renderFlow();
  };
  window.nextFlowStep=()=>{
    clearInterval(flowInterval);run=false;
    if(ci<steps.length-1){ci++;tm=0;renderFlow();}
    else{
      const mins=Math.round((Date.now()-t0)/60000);
      if(type==='morning')setDay(c=>({...c,h:{...c.h,wake:true,noDrift:mins<=30}}));
      closeFlow();
    }
  };
  window.closeFlow=()=>{clearInterval(flowInterval);ov.classList.add('hidden');run=false;};
  renderFlow();
}

    "\n❌ Missed: "+HB.filter(h=>!d.h[h.id]).map(h=>h.l).join(", ")+
    "\n🍽️ Meals: "+((d.meals||[]).map(m=>m.t+": "+m.x).join("; ")||"not logged")+
    "\n💪 Exercise: "+(Object.entries(d.ex||{}).map(([n,x])=>x.t==="S"?n+": "+(x.s||[]).map(s=>s.r+"×"+s.w+"kg").join(", "):n+": "+(x.dur||0)+"min").join("; ")||"none")+
    "\n🧘 Breathing: "+((d.br||[]).map(b=>b.n+" at "+b.a).join(", ")||"none")+
    "\n🏃 Race: "+ar.n+" Week "+D.rw+"/"+ar.w+
    "\n📝 Note: "+(d.note||"—")+
    "\n\nPlease log this to Jivanam Supabase and give me feedback.";
  if(typeof sendPrompt==="function")sendPrompt(msg);
}

// ── INIT ──
async function init(){
  await loadData();
  initNav();
  render();
}
init();

// ── SERVICE WORKER (for offline + PWA install) ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
  });
}
</script>
